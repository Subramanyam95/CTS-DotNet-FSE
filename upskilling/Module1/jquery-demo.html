<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Demo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>jQuery Controls Demo</h1>

    <button id="hideBtn">Hide Paragraph</button>
    <button id="showBtn">Show Paragraph</button>
    <button id="fadeOutBtn">Fade Out</button>
    <button id="fadeInBtn">Fade In</button>
    <button id="toggleBtn">Toggle</button>
    <button id="animateBtn">Animate</button>

    <p>This is a sample paragraph for jQuery hide/show.</p>

    <div class="eventCard">
        Sample Event Card
    </div>

    <br>

    <input type="text" id="itemInput" placeholder="Add Item">
    <button id="addItemBtn">Add Item</button>
    <button id="removeAllBtn">Remove All</button>

    <ul id="itemList"></ul>

    <br>

    <button id="colorBtn">Change Color</button>

    <div id="colorBox"
        style="width:200px;height:100px;border:1px solid black;">
    </div>

    <br>

    <div id="hoverBox"
        style="width:200px;height:100px;background:lightgray;">
        Hover Here
    </div>

    <br>

    <input type="text" id="keyInput" placeholder="Type here">
    <p id="keyOutput"></p>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- jQuery File -->
    <script src="jquery.js"></script>

</body>
</html>
