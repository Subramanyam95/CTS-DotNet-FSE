<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Community Portal</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Community Portal</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>

            <form class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Search">
                <button class="btn btn-success">Search</button>
            </form>
        </div>
    </div>
</nav>

<!-- Responsive Grid -->
<div class="container mt-5">
    <div class="row text-center">
        <div class="col-12 col-md-6 col-lg-4 bg-primary text-white p-3">Event 1</div>
        <div class="col-12 col-md-6 col-lg-4 bg-warning p-3">Event 2</div>
        <div class="col-12 col-md-12 col-lg-4 bg-success text-white p-3">Event 3</div>
    </div>
</div>

<!-- Sidebar Layout -->
<div class="container mt-5">
    <div class="row">
        <div class="col-md-3 bg-light p-3">
            Sidebar
        </div>
        <div class="col-md-9 bg-secondary text-white p-3">
            Main Content Area
        </div>
    </div>
</div>

<!-- Typography -->
<div class="container mt-5">
    <h1 class="display-1">Community Events</h1>
    <p class="lead">Join our exciting upcoming activities.</p>
    <p class="text-muted fw-bold text-uppercase">Limited seats available!</p>
</div>

<!-- Registration Form -->
<div class="container mt-5">
    <form>
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Enter Name">
        </div>

        <div class="mb-3 form-floating">
            <input type="email" class="form-control" id="email" placeholder="Email">
            <label for="email">Email address</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Accept Terms</label>
        </div>

        <button class="btn btn-primary mt-3">Register</button>
    </form>
</div>

<!-- Buttons -->
<div class="container mt-5">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-outline-success">Outline</button>

    <div class="btn-group mt-3">
        <button class="btn btn-danger">Left</button>
        <button class="btn btn-warning">Middle</button>
        <button class="btn btn-success">Right</button>
    </div>
</div>

<!-- Profile Card -->
<div class="container mt-5">
    <div class="card shadow-lg rounded-pill" style="width: 18rem;">
        <img src="images/profile.jpg" class="card-img-top rounded-circle border border-primary border-3" alt="Profile">
        <div class="card-body">
            <h5 class="card-title">John Doe</h5>
            <p class="card-text">Community Organizer</p>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="container mt-5">
    <button class="btn btn-info" data-bs-toggle="modal" data-bs-target="#eventModal">
        Open Event Details
    </button>

    <div class="modal fade" id="eventModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Event Details</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Welcome to our community event!
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Accordion -->
<div class="container mt-5">
    <div class="accordion" id="eventAccordion">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
                    Event Schedule
                </button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse show">
                <div class="accordion-body">
                    Event starts at 10:00 AM
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer with Icons -->
<footer class="bg-dark text-white text-center p-4 mt-5">
    <i class="bi bi-facebook mx-2"></i>
    <i class="bi bi-twitter mx-2"></i>
    <i class="bi bi-instagram mx-2"></i>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
